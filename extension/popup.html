<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
    }

    h3 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .status-container {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #94a3b8;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .status-dot.connected {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
    }

    .status-dot.error {
      background: #f87171;
      box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
    }
  </style>
</head>
<body>
  <h3>🛡️ Koneczny Analyzer</h3>
  
  <div class="form-group">
    <label for="backendUrl">Adres URL Backendu</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000">
  </div>

  <div class="form-group">
    <label for="apiKey">Klucz API Gemini (opcjonalny)</label>
    <input type="password" id="apiKey" placeholder="Zostanie pobrany z serwera, jeśli pusty">
  </div>

  <button id="saveBtn">Zapisz ustawienia</button>

  <div class="status-container">
    <span>Status serwera:</span>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Sprawdzanie...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
