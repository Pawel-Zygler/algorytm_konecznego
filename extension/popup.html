<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Koneczny Analyzer Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>🛡️ Koneczny Analyzer</h1>
  </header>

  <main>
    <form id="settingsForm" autocomplete="off">
      <div class="form-group">
        <label for="backendUrl">Adres URL Backendu</label>
        <input type="url" id="backendUrl" name="backendUrl" placeholder="http://localhost:8005" required>
      </div>

      <div class="form-group">
        <label for="apiKey">Klucz API Gemini (opcjonalny)</label>
        <input type="password" id="apiKey" name="apiKey" placeholder="Zostanie pobrany z serwera, jeśli pusty">
      </div>

      <button type="submit" id="saveBtn" class="submit-btn">Zapisz ustawienia</button>
    </form>
  </main>

  <footer class="status-container">
    <span>Status serwera:</span>
    <div class="status-badge" aria-live="polite">
      <span class="status-dot" id="statusDot" aria-hidden="true"></span>
      <span id="statusText">Sprawdzanie...</span>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
