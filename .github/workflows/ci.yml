name: Algorytm Konecznego CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests fastapi uvicorn google-generativeai pydantic python-dotenv

      - name: Verify Python syntax
        run: |
          python -m py_compile backend/analyzer.py
          python -m py_compile backend/main.py

      - name: Verify Extension JS syntax
        run: |
          node -c extension/content.js

      - name: Run Fast Unit Tests
        run: |
          pytest tests/unit/
